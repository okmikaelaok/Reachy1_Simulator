name: Release Standalone Build

on:
  push:
    tags:
      - "standalone-*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to publish as a standalone release.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag could not be determined."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_name=reachy-$tag-windows-x64.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Package current standalone build
        shell: pwsh
        run: |
          ./scripts/package-standalone-release.ps1 -OutputPath "artifacts/${{ steps.meta.outputs.asset_name }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Reachy standalone build ${{ steps.meta.outputs.tag }}
          files: |
            artifacts/${{ steps.meta.outputs.asset_name }}
            artifacts/${{ steps.meta.outputs.asset_name }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
